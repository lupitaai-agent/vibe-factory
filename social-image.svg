<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1B1F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1200;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="65%" cy="40%">
      <stop offset="0%" style="stop-color:#CAFF15;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#CAFF15;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Glow -->
  <ellipse cx="850" cy="250" rx="500" ry="350" fill="url(#glowGradient)"/>
  
  <!-- Main content -->
  <g>
    <!-- Title -->
    <text x="80" y="140" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="900" fill="#CAFF15" letter-spacing="-1">Vibe Factory</text>
    
    <!-- Subtitle -->
    <text x="80" y="220" font-family="Inter, -apple-system, sans-serif" font-size="40" font-weight="600" fill="#FFFFFF">Daily Research, Automated by Olaf</text>
    
    <!-- Tagline -->
    <text x="80" y="280" font-family="Inter, -apple-system, sans-serif" font-size="28" fill="rgba(255,255,255,0.7)">One AI agent. The full pipeline.</text>
    
    <!-- Badge -->
    <rect x="80" y="310" width="320" height="60" rx="8" fill="none" stroke="#CAFF15" stroke-width="2" stroke-opacity="0.35"/>
    <text x="240" y="350" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#CAFF15" text-anchor="middle">🤖 Powered by Aethir Claw</text>
    
    <!-- Footer branding -->
    <text x="1120" y="610" font-family="Inter, -apple-system, sans-serif" font-size="18" fill="rgba(255,255,255,0.4)" text-anchor="end">vibefactory.io</text>
  </g>
</svg>
