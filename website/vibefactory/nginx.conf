##
## Vibe Factory — Nginx config
## Place this at: /etc/nginx/sites-available/vibefactory
## Then: sudo ln -s /etc/nginx/sites-available/vibefactory /etc/nginx/sites-enabled/
## Then: sudo nginx -t && sudo systemctl reload nginx
##
## SSL: after DNS is pointing, run:
## sudo certbot --nginx -d vibefactory.io -d www.vibefactory.io
##

server {
    listen 80;
    listen [::]:80;
    server_name vibefactory.io www.vibefactory.io;

    # Redirect www to non-www
    if ($host = www.vibefactory.io) {
        return 301 https://vibefactory.io$request_uri;
    }

    # Root directory — upload your files here
    root /var/www/vibefactory;
    index index.html;

    # Serve static files, fall back to index.html
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Cache static assets aggressively
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Security headers — good for SEO trust signals too
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip for faster page loads
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # Logs — useful for Olaf to audit traffic patterns
    access_log /var/log/nginx/vibefactory_access.log;
    error_log  /var/log/nginx/vibefactory_error.log;
}

## After Certbot runs, it will automatically add the HTTPS server block below.
## You do not need to add it manually.
